
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tuukka's Thesis Run</title>
  <style>
    body { margin: 0; background: #111; display: grid; place-items: center; height: 100vh; font-family: Arial, sans-serif; }
    canvas { background: linear-gradient(#67bfff, #c8f6ff); border: 2px solid #333; image-rendering: pixelated; }
    .hud {
      position: fixed; top: 12px; left: 12px; color: #fff;
      font-size: 14px; line-height: 1.35;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
      background: rgba(0,0,0,0.25);
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(2px);
    }
    .hint { opacity: 0.9; margin-top: 6px; font-size: 12px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,0.12); margin-left:6px; }
  </style>
</head>
<body>
  <div class="hud">
    <div><b>Tuukka’s Thesis Run</b> <span class="badge">Konecranes</span></div>
    <div>Articles collected: <span id="articles">0</span> / <span id="total">0</span></div>
    <div>Thesis length: <span id="pages">0</span> pages</div>
    <div>Companies met: <span id="met">0</span> / <span id="metTotal">0</span></div>
    <div class="hint">Move: ← → or A D | Jump: ↑ or W or Space | Restart: R</div>
  </div>

  <canvas id="c" width="960" height="540"></canvas>

<script>
/* ====== TUUKKA'S THESIS RUN (single-file platformer) ====== */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const hudArticles = document.getElementById("articles");
const hudTotal = document.getElementById("total");
const hudPages = document.getElementById("pages");
const hudMet = document.getElementById("met");
const hudMetTotal = document.getElementById("metTotal");

const keys = new Set();
addEventListener("keydown", (e) => {
  keys.add(e.key.toLowerCase());
  if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key)) e.preventDefault();
});
addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

const W = canvas.width, H = canvas.height;

// Physics tuning
const GRAVITY = 0.7;
const FRICTION = 0.85;
const MOVE_ACC = 0.9;
const MAX_SPEED = 7.0;
const JUMP_V = 13.5;

// Camera that follows player
const cam = { x: 0, y: 0 };

function rectsOverlap(a, b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// Coin-ish pickup (articles) uses circle-rect collision
function circleRectHit(cx, cy, r, rect){
  const closestX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
  const closestY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return (dx*dx + dy*dy) <= r*r;
}

// ====== Game state ======
let win = false;
let messageTimer = 0;
let messageText = "";

// Player = Tuukka
const player = {
  name: "Tuukka",
  org: "Konecranes",
  x: 80, y: 100,
  w: 34, h: 44,
  vx: 0, vy: 0,
  onGround: false,
  articles: 0,
  thesisPages: 10 // starting thesis length (change if you want)
};

// Platforms (edit to build level)
const platforms = [
  { x: -200, y: 480, w: 2300, h: 80 },     // ground
  { x: 180, y: 390, w: 160, h: 20 },
  { x: 420, y: 330, w: 160, h: 20 },
  { x: 650, y: 280, w: 180, h: 20 },
  { x: 920, y: 360, w: 220, h: 20 },
  { x: 1220, y: 300, w: 180, h: 20 },
  { x: 1460, y: 240, w: 200, h: 20 },
  { x: 1720, y: 360, w: 220, h: 20 },
];

// Articles (was coins)
const articles = [
  { x: 230, y: 350, r: 10, taken: false },
  { x: 470, y: 290, r: 10, taken: false },
  { x: 720, y: 240, r: 10, taken: false },
  { x: 1000, y: 320, r: 10, taken: false },
  { x: 1280, y: 260, r: 10, taken: false },
  { x: 1520, y: 200, r: 10, taken: false },
  { x: 1800, y: 320, r: 10, taken: false },
];

// “Meet other companies” = NPC blocks you touch
const companies = [
  { name: "Company A", x: 520,  y: 304, w: 70, h: 26, met: false },
  { name: "Company B", x: 980,  y: 334, w: 70, h: 26, met: false },
  { name: "Company C", x: 1490, y: 214, w: 70, h: 26, met: false },
];

// Goal block (finish line / professor)
const goal = { x: 1950, y: 420, w: 40, h: 60 };

function updateHud(){
  hudArticles.textContent = player.articles;
  hudTotal.textContent = articles.length;

  hudPages.textContent = player.thesisPages;

  const metCount = companies.filter(c => c.met).length;
  hudMet.textContent = metCount;
  hudMetTotal.textContent = companies.length;
}

function showMessage(text, frames=60){
  messageText = text;
  messageTimer = frames;
}

function resetLevel(){
  player.x = 80; player.y = 100;
  player.vx = 0; player.vy = 0;
  player.onGround = false;

  player.articles = 0;
  player.thesisPages = 10; // reset to base pages

  for (const a of articles) a.taken = false;
  for (const c of companies) c.met = false;

  win = false;
  messageTimer = 0;
  messageText = "";
  updateHud();
}

// ====== Input ======
function doInput(){
  const left  = keys.has("arrowleft") || keys.has("a");
  const right = keys.has("arrowright") || keys.has("d");
  const jump  = keys.has("arrowup") || keys.has("w") || keys.has(" ");

  if (left)  player.vx -= MOVE_ACC;
  if (right) player.vx += MOVE_ACC;

  player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));

  if (jump && player.onGround){
    player.vy = -JUMP_V;
    player.onGround = false;
  }

  if (keys.has("r")) resetLevel();
}

// ====== Physics + collisions ======
function applyPhysics(){
  player.vy += GRAVITY;

  player.vx *= player.onGround ? FRICTION : 0.98;

  // Move X
  player.x += player.vx;
  for (const p of platforms){
    if (rectsOverlap(player, p)){
      if (player.vx > 0) player.x = p.x - player.w;
      if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  // Move Y
  player.y += player.vy;
  player.onGround = false;
  for (const p of platforms){
    if (rectsOverlap(player, p)){
      if (player.vy > 0){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0){
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Fall off world
  if (player.y > 900) {
    showMessage("Tuukka fell! Restarting…", 60);
    resetLevel();
  }
}

// ====== Professor grading ======
function professorGrade(pages){
  // Simple 1–5 grading based on thesis pages
  // Adjust thresholds to your liking
  if (pages >= 22) return 5;
  if (pages >= 19) return 4;
  if (pages >= 16) return 3;
  if (pages >= 13) return 2;
  return 1;
}

// ====== Game logic ======
function gameLogic(){
  const playerRect = { x: player.x, y: player.y, w: player.w, h: player.h };

  // Collect articles => +1 thesis page
  for (const a of articles){
    if (!a.taken && circleRectHit(a.x, a.y, a.r, playerRect)){
      a.taken = true;
      player.articles++;
      player.thesisPages++; // IMPORTANT: +1 page per article
      updateHud();
      showMessage("Collected an article → thesis +1 page", 45);
    }
  }

  // Meet companies (touch block)
  for (const c of companies){
    if (!c.met && rectsOverlap(playerRect, c)){
      c.met = true;
      updateHud();
      showMessage(`Met ${c.name} 🤝`, 60);
    }
  }

  // Finish line
  if (!win && rectsOverlap(playerRect, goal)){
    win = true;
    const grade = professorGrade(player.thesisPages);
    showMessage(`Professor's grade: ${grade}/5 (Pages: ${player.thesisPages})`, 999999);
  }

  // Camera follows player
  cam.x = Math.max(0, player.x - W * 0.35);
}

// ====== Drawing ======
function drawBanner(text){
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.60)";
  ctx.fillRect(0, H-70, W, 70);
  ctx.fillStyle = "#fff";
  ctx.font = "18px Arial";
  ctx.fillText(text, 18, H-28);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0, 0, W, H);

  // Clouds (parallax)
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = "#fff";
  for (let i=0; i<8; i++){
    const x = (i*260 - (cam.x*0.3)%260);
    const y = 60 + (i%3)*40;
    ctx.beginPath();
    ctx.ellipse(x+120, y, 70, 20, 0, 0, Math.PI*2);
    ctx.ellipse(x+170, y+10, 60, 18, 0, 0, Math.PI*2);
    ctx.ellipse(x+80, y+10, 50, 16, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Camera translate
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // Platforms
  for (const p of platforms){
    ctx.fillStyle = "#2c7a3f";
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(p.x, p.y, p.w, 6);
  }

  // Goal (Professor)
  ctx.fillStyle = win ? "#00ff88" : "#ff3b3b";
  ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fillRect(goal.x+6, goal.y+6, goal.w-12, 10);

  // Companies (NPC blocks)
  for (const c of companies){
    ctx.fillStyle = c.met ? "rgba(255,255,255,0.25)" : "#4b3cff";
    ctx.fillRect(c.x, c.y, c.w, c.h);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fillRect(c.x+6, c.y+6, c.w-12, 6);

    // label
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.font = "12px Arial";
    ctx.fillText(c.name, c.x, c.y - 6);
  }

  // Articles (yellow circles)
  for (const a of articles){
    if (a.taken) continue;
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
    ctx.fillStyle = "#ffd34d";
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // tiny paper line
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(a.x - 4, a.y);
    ctx.lineTo(a.x + 4, a.y);
    ctx.stroke();
  }

  // Tuukka (player)
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // face
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(player.x + 8, player.y + 12, 6, 6);
  ctx.fillRect(player.x + 20, player.y + 12, 6, 6);

  // name tag
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.font = "12px Arial";
  ctx.fillText("Tuukka", player.x - 2, player.y - 6);

  ctx.restore();

  // Bottom message
  if (messageTimer > 0){
    messageTimer--;
    drawBanner(messageText);
  }
  if (win){
    drawBanner(messageText + " — Press R to restart");
  }
}

// ====== Main loop ======
function loop(){
  doInput();
  if (!win){
    applyPhysics();
    gameLogic();
  }
  draw();
  requestAnimationFrame(loop);
}

updateHud();
resetLevel();
loop();
</script>
</body>
</html>
