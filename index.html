
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tuukka's Thesis Run</title>
  <style>
    body { margin: 0; background: #111; display: grid; place-items: center; height: 100vh; font-family: Arial, sans-serif; }
    canvas { background: linear-gradient(#67bfff, #c8f6ff); border: 2px solid #333; image-rendering: pixelated; }
    .hud {
      position: fixed; top: 12px; left: 12px; color: #fff;
      font-size: 14px; line-height: 1.35;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
      background: rgba(0,0,0,0.25);
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(2px);
      max-width: 380px;
    }
    .hint { opacity: 0.9; margin-top: 6px; font-size: 12px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,0.12); margin-left:6px; }
    .small { opacity: .85; font-size: 12px; }
  </style>
</head>
<body>
  <div class="hud">
    <div><b>Tuukka’s Thesis Run</b> <span class="badge">Konecranes</span></div>
    <div>Articles collected: <span id="articles">0</span> / <span id="total">0</span></div>
    <div>Thesis length: <span id="pages">0</span> pages</div>
    <div>Companies met: <span id="met">0</span> / <span id="metTotal">0</span></div>
    <div class="small">Tip: Avoid competitors — they steal pages.</div>
    <div class="hint">Move: ← → or A D | Jump: ↑ or W or Space | Restart: R</div>
  </div>

  <canvas id="c" width="960" height="540"></canvas>

<script>
/* ====== TUUKKA'S THESIS RUN (single-file platformer) ====== */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const hudArticles = document.getElementById("articles");
const hudTotal = document.getElementById("total");
const hudPages = document.getElementById("pages");
const hudMet = document.getElementById("met");
const hudMetTotal = document.getElementById("metTotal");

const keys = new Set();
addEventListener("keydown", (e) => {
  keys.add(e.key.toLowerCase());
  if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key)) e.preventDefault();
});
addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

const W = canvas.width, H = canvas.height;

// Physics tuning
const GRAVITY = 0.7;
const FRICTION = 0.85;
const MOVE_ACC = 0.9;
const MAX_SPEED = 7.0;
const JUMP_V = 13.5;

// Camera
const cam = { x: 0, y: 0 };

function rectsOverlap(a, b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

// Paper pickup collision uses rect-rect (simpler than circle now)
function paperHit(paper, rect){
  const r = { x: paper.x, y: paper.y, w: paper.w, h: paper.h };
  return rectsOverlap(r, rect);
}

// ====== Game state ======
let win = false;
let messageTimer = 0;
let messageText = "";

// Tuukka (player)
const player = {
  name: "Tuukka",
  org: "Konecranes",
  x: 80, y: 100,
  w: 34, h: 44,
  vx: 0, vy: 0,
  onGround: false,
  articles: 0,
  thesisPages: 10,
  invuln: 0 // brief invulnerability after getting hit
};

// Longer level (more platforms)
const platforms = [
  // Ground (very long)
  { x: -300, y: 480, w: 5200, h: 80 },

  // Stage 1
  { x: 180, y: 390, w: 170, h: 20 },
  { x: 430, y: 330, w: 170, h: 20 },
  { x: 690, y: 280, w: 200, h: 20 },
  { x: 980, y: 360, w: 240, h: 20 },

  // Stage 2
  { x: 1320, y: 310, w: 200, h: 20 },
  { x: 1570, y: 250, w: 220, h: 20 },
  { x: 1850, y: 360, w: 240, h: 20 },
  { x: 2160, y: 300, w: 220, h: 20 },

  // Stage 3
  { x: 2460, y: 240, w: 240, h: 20 },
  { x: 2760, y: 360, w: 260, h: 20 },
  { x: 3080, y: 290, w: 220, h: 20 },
  { x: 3360, y: 230, w: 240, h: 20 },

  // Final stretch (stair-ish)
  { x: 3680, y: 380, w: 180, h: 20 },
  { x: 3880, y: 340, w: 180, h: 20 },
  { x: 4080, y: 300, w: 180, h: 20 },
  { x: 4280, y: 260, w: 180, h: 20 }
];

// Articles now look like paper sheets
// Each = +1 page
const articles = [
  // Stage 1
  { x: 230, y: 350, w: 18, h: 22, taken: false },
  { x: 480, y: 290, w: 18, h: 22, taken: false },
  { x: 760, y: 240, w: 18, h: 22, taken: false },
  { x: 1070, y: 320, w: 18, h: 22, taken: false },

  // Stage 2
  { x: 1400, y: 270, w: 18, h: 22, taken: false },
  { x: 1650, y: 210, w: 18, h: 22, taken: false },
  { x: 1950, y: 320, w: 18, h: 22, taken: false },
  { x: 2240, y: 260, w: 18, h: 22, taken: false },

  // Stage 3
  { x: 2540, y: 200, w: 18, h: 22, taken: false },
  { x: 2860, y: 320, w: 18, h: 22, taken: false },
  { x: 3160, y: 250, w: 18, h: 22, taken: false },
  { x: 3440, y: 190, w: 18, h: 22, taken: false },

  // Final stretch
  { x: 3720, y: 340, w: 18, h: 22, taken: false },
  { x: 3920, y: 300, w: 18, h: 22, taken: false },
  { x: 4120, y: 260, w: 18, h: 22, taken: false },
  { x: 4320, y: 220, w: 18, h: 22, taken: false }
];

// Real crane companies as neutral networking NPCs ("meet other companies")
const companies = [
  { name: "Liebherr",     x: 560,  y: 304, w: 92, h: 26, met: false },
  { name: "Tadano",       x: 1160, y: 334, w: 92, h: 26, met: false },
  { name: "Demag",        x: 1600, y: 224, w: 92, h: 26, met: false },
  { name: "Manitowoc",    x: 2060, y: 334, w: 110, h: 26, met: false },
  { name: "Terex",        x: 2580, y: 214, w: 92, h: 26, met: false },
  { name: "SANY",         x: 3000, y: 264, w: 92, h: 26, met: false },
  { name: "Zoomlion",     x: 3440, y: 204, w: 100, h: 26, met: false },
  { name: "XCMG",         x: 3920, y: 314, w: 92, h: 26, met: false },
];

// Parody competitors as enemies (they steal pages)
const enemies = [
  { name: "kokecranes",  x: 880,  y: 454, w: 46, h: 26, vx: 1.6, minX: 760,  maxX: 1080, steal: 2 },
  { name: "satateräs",   x: 1760, y: 454, w: 46, h: 26, vx: 1.9, minX: 1600, maxX: 1980, steal: 3 },
  { name: "CraneForge",  x: 2700, y: 454, w: 46, h: 26, vx: 2.1, minX: 2520, maxX: 2980, steal: 2 },
  { name: "HoistWorks",  x: 3500, y: 454, w: 46, h: 26, vx: 2.3, minX: 3320, maxX: 3700, steal: 3 },
];

// Finish line / professor (farther away now)
const goal = { x: 4620, y: 420, w: 46, h: 60 };

function updateHud(){
  hudArticles.textContent = player.articles;
  hudTotal.textContent = articles.length;
  hudPages.textContent = player.thesisPages;

  const metCount = companies.filter(c => c.met).length;
  hudMet.textContent = metCount;
  hudMetTotal.textContent = companies.length;
}

function showMessage(text, frames=60){
  messageText = text;
  messageTimer = frames;
}

function resetLevel(){
  player.x = 80; player.y = 100;
  player.vx = 0; player.vy = 0;
  player.onGround = false;

  player.articles = 0;
  player.thesisPages = 10;
  player.invuln = 0;

  for (const a of articles) a.taken = false;
  for (const c of companies) c.met = false;

  // Reset enemies to start-ish positions (optional)
  enemies[0].x = 880;
  enemies[1].x = 1760;
  enemies[2].x = 2700;
  enemies[3].x = 3500;

  win = false;
  messageTimer = 0;
  messageText = "";
  updateHud();
}

// ====== Input ======
function doInput(){
  const left  = keys.has("arrowleft") || keys.has("a");
  const right = keys.has("arrowright") || keys.has("d");
  const jump  = keys.has("arrowup") || keys.has("w") || keys.has(" ");

  if (left)  player.vx -= MOVE_ACC;
  if (right) player.vx += MOVE_ACC;

  player.vx = clamp(player.vx, -MAX_SPEED, MAX_SPEED);

  if (jump && player.onGround){
    player.vy = -JUMP_V;
    player.onGround = false;
  }

  if (keys.has("r")) resetLevel();
}

// ====== Physics & collisions ======
function applyPhysics(){
  player.vy += GRAVITY;
  player.vx *= player.onGround ? FRICTION : 0.98;

  // Move X
  player.x += player.vx;
  for (const p of platforms){
    if (rectsOverlap(player, p)){
      if (player.vx > 0) player.x = p.x - player.w;
      if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  // Move Y
  player.y += player.vy;
  player.onGround = false;
  for (const p of platforms){
    if (rectsOverlap(player, p)){
      if (player.vy > 0){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0){
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Fall off world
  if (player.y > 950) {
    showMessage("Tuukka fell! Restarting…", 60);
    resetLevel();
  }
}

// ====== Professor grading ======
function professorGrade(pages){
  // 1–5 grade scale
  if (pages >= 28) return 5;
  if (pages >= 23) return 4;
  if (pages >= 18) return 3;
  if (pages >= 14) return 2;
  return 1;
}

// ====== Enemies ======
function updateEnemies(){
  for (const e of enemies){
    e.x += e.vx;
    if (e.x < e.minX || e.x + e.w > e.maxX) e.vx *= -1;

    // Keep enemies on ground visually
    e.y = 480 - 80 - e.h;

    // Collision steals pages
    if (player.invuln <= 0 && rectsOverlap(player, e)){
      const stolen = Math.min(e.steal, player.thesisPages); // don’t go negative
      player.thesisPages = Math.max(0, player.thesisPages - stolen);
      player.invuln = 45;

      // Knockback
      const dir = (player.x + player.w/2) < (e.x + e.w/2) ? -1 : 1;
      player.vx = 7 * dir;
      player.vy = -7;

      updateHud();
      showMessage(`${e.name} stole ${stolen} page(s)!`, 70);

      // Optional: if pages hit 0 => restart
      if (player.thesisPages <= 0){
        showMessage("No pages left! Restarting…", 80);
        setTimeout(resetLevel, 200); // tiny delay
      }
    }
  }
}

// ====== Game logic ======
function gameLogic(){
  const playerRect = { x: player.x, y: player.y, w: player.w, h: player.h };

  // Collect articles => +1 thesis page
  for (const a of articles){
    if (!a.taken && paperHit(a, playerRect)){
      a.taken = true;
      player.articles++;
      player.thesisPages++;
      updateHud();
      showMessage("Collected an article → thesis +1 page", 45);
    }
  }

  // Meet companies (touch block)
  for (const c of companies){
    const cr = { x: c.x, y: c.y, w: c.w, h: c.h };
    if (!c.met && rectsOverlap(playerRect, cr)){
      c.met = true;
      updateHud();
      showMessage(`Met ${c.name} 🤝`, 60);
    }
  }

  // Enemies
  updateEnemies();
  if (player.invuln > 0) player.invuln--;

  // Finish line
  if (!win && rectsOverlap(playerRect, goal)){
    win = true;
    const grade = professorGrade(player.thesisPages);
    showMessage(`Professor's grade: ${grade}/5 (Pages: ${player.thesisPages})`, 999999);
  }

  // Camera follows player
  cam.x = Math.max(0, player.x - W * 0.35);
}

// ====== Drawing ======
function drawBanner(text){
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.60)";
  ctx.fillRect(0, H-70, W, 70);
  ctx.fillStyle = "#fff";
  ctx.font = "18px Arial";
  ctx.fillText(text, 18, H-28);
  ctx.restore();
}

function drawPaper(x, y, w, h){
  // Paper body
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(x, y, w, h);

  // Folded corner
  ctx.fillStyle = "#e8e8e8";
  ctx.beginPath();
  ctx.moveTo(x + w - 6, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + 6);
  ctx.closePath();
  ctx.fill();

  // Outline
  ctx.strokeStyle = "rgba(0,0,0,0.22)";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

  // Text lines
  ctx.strokeStyle = "rgba(0,0,0,0.18)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 3, y + 7);
  ctx.lineTo(x + w - 3, y + 7);
  ctx.moveTo(x + 3, y + 11);
  ctx.lineTo(x + w - 6, y + 11);
  ctx.moveTo(x + 3, y + 15);
  ctx.lineTo(x + w - 5, y + 15);
  ctx.stroke();
}

function draw(){
  ctx.clearRect(0, 0, W, H);

  // Clouds (parallax)
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = "#fff";
  for (let i=0; i<10; i++){
    const x = (i*260 - (cam.x*0.3)%260);
    const y = 60 + (i%3)*40;
    ctx.beginPath();
    ctx.ellipse(x+120, y, 70, 20, 0, 0, Math.PI*2);
    ctx.ellipse(x+170, y+10, 60, 18, 0, 0, Math.PI*2);
    ctx.ellipse(x+80, y+10, 50, 16, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Camera translate
  ctx.save();
  ctx.translate(-cam.x, 0);

  // Platforms
  for (const p of platforms){
    ctx.fillStyle = "#2c7a3f";
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(p.x, p.y, p.w, 6);
  }

  // Finish line (Professor)
  ctx.fillStyle = win ? "#00ff88" : "#ff3b3b";
  ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fillRect(goal.x+6, goal.y+6, goal.w-12, 10);

  // Company NPCs
  for (const c of companies){
    ctx.fillStyle = c.met ? "rgba(255,255,255,0.18)" : "#4b3cff";
    ctx.fillRect(c.x, c.y, c.w, c.h);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fillRect(c.x+6, c.y+6, c.w-12, 6);

    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.font = "12px Arial";
    ctx.fillText(c.name, c.x, c.y - 6);
  }

  // Articles (papers)
  for (const a of articles){
    if (a.taken) continue;
    drawPaper(a.x, a.y, a.w, a.h);
  }

  // Enemies (competitors)
  for (const e of enemies){
    ctx.fillStyle = "#7a3b1a";
    ctx.fillRect(e.x, e.y, e.w, e.h);
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.fillRect(e.x + 6, e.y + 6, e.w - 12, 6);

    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.font = "12px Arial";
    ctx.fillText(e.name, e.x - 2, e.y - 6);
  }

  // Tuukka (player) — blink when invulnerable
  const blink = player.invuln > 0 && Math.floor(player.invuln/6) % 2 === 0;
  if (!blink){
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // face
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(player.x + 8, player.y + 12, 6, 6);
    ctx.fillRect(player.x + 20, player.y + 12, 6, 6);

    // name tag
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "12px Arial";
    ctx.fillText("Tuukka", player.x - 2, player.y - 6);
  }

  ctx.restore();

  // Bottom message
  if (messageTimer > 0){
    messageTimer--;
    drawBanner(messageText);
  }
  if (win){
    drawBanner(messageText + " — Press R to restart");
  }
}

// ====== Main loop ======
function loop(){
  doInput();
  if (!win){
    applyPhysics();
    gameLogic();
  }
  draw();
  requestAnimationFrame(loop);
}

updateHud();
resetLevel();
loop();
</script>
</body>
</html>
